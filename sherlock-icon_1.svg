<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <!-- iOS background: rounded square, dark -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#0d1117"/>

  <!-- Scanline texture inside lens (clipped) -->
  <defs>
    <clipPath id="lensClip">
      <circle cx="420" cy="400" r="260"/>
    </clipPath>
  </defs>
  <g clip-path="url(#lensClip)" opacity="0.12">
    <line x1="160" y1="180" x2="680" y2="180" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="214" x2="680" y2="214" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="248" x2="680" y2="248" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="282" x2="680" y2="282" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="316" x2="680" y2="316" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="350" x2="680" y2="350" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="384" x2="680" y2="384" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="418" x2="680" y2="418" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="452" x2="680" y2="452" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="486" x2="680" y2="486" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="520" x2="680" y2="520" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="554" x2="680" y2="554" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="588" x2="680" y2="588" stroke="#00b8ff" stroke-width="4"/>
    <line x1="160" y1="622" x2="680" y2="622" stroke="#00b8ff" stroke-width="4"/>
  </g>

  <!-- Inner ring -->
  <circle cx="420" cy="400" r="196" fill="none" stroke="#00b8ff" stroke-width="3.5" opacity="0.35"/>

  <!-- Crosshair axes -->
  <line x1="160" y1="400" x2="680" y2="400" stroke="#00b8ff" stroke-width="2.5" opacity="0.18"/>
  <line x1="420" y1="140" x2="420" y2="660" stroke="#00b8ff" stroke-width="2.5" opacity="0.18"/>

  <!-- Corner brackets -->
  <polyline points="310,298 310,258 350,258" fill="none" stroke="#00b8ff" stroke-width="10" stroke-linecap="square"/>
  <polyline points="530,298 530,258 490,258" fill="none" stroke="#00b8ff" stroke-width="10" stroke-linecap="square"/>
  <polyline points="310,502 310,542 350,542" fill="none" stroke="#00b8ff" stroke-width="10" stroke-linecap="square"/>
  <polyline points="530,502 530,542 490,542" fill="none" stroke="#00b8ff" stroke-width="10" stroke-linecap="square"/>

  <!-- Tick marks N/S/E/W -->
  <line x1="420" y1="132" x2="420" y2="158" stroke="#00b8ff" stroke-width="9"/>
  <line x1="420" y1="642" x2="420" y2="668" stroke="#00b8ff" stroke-width="9"/>
  <line x1="152" y1="400" x2="178" y2="400" stroke="#00b8ff" stroke-width="9"/>
  <line x1="662" y1="400" x2="688" y2="400" stroke="#00b8ff" stroke-width="9"/>

  <!-- Center crosshair -->
  <line x1="420" y1="372" x2="420" y2="428" stroke="#00b8ff" stroke-width="7"/>
  <line x1="392" y1="400" x2="448" y2="400" stroke="#00b8ff" stroke-width="7"/>
  <circle cx="420" cy="400" r="12" fill="#00b8ff"/>

  <!-- Main lens ring -->
  <circle cx="420" cy="400" r="260" fill="none" stroke="#00b8ff" stroke-width="42"/>

  <!-- Handle -->
  <line x1="624" y1="604" x2="840" y2="820" stroke="#00b8ff" stroke-width="72" stroke-linecap="round"/>
  <!-- Handle highlight -->
  <line x1="624" y1="604" x2="840" y2="820" stroke="#5dd4ff" stroke-width="10" stroke-linecap="round" opacity="0.28"/>

</svg>
